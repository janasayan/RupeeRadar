services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./rupeeradar.db
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      SESSION_TTL_HOURS: 24
    volumes:
      - ./backend:/app

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
